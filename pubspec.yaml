name: pusaka_tiles
description: Pusaka Tiles — ketuk ubin, mainkan melodi lagu daerah Nusantara & klasik dunia.
publish_to: 'none'
version: 1.6.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  audioplayers: ^6.1.0       # original synthesized note tones (proven pipeline)
  google_mobile_ads: '>=5.3.0 <7.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color: "#15110A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/
    - assets/audio/piano/
    - assets/audio/angklung/
    - assets/audio/gamelan/
    - assets/audio/suling/
    - assets/audio/backing/
    - assets/audio/ensemble/
  fonts:
    # Outfit — modern geometric display face (OFL) for score/combo/headers.
    # Variable wght axis; Flutter maps fontWeight onto it.
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit.ttf
    - family: Jakarta
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    # Cinzel — regal heritage display face for the wordmark + headers (variable
    # weight axis driven via FontVariation in code; "Panggung Malam" personality).
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf

name: Force Resubmit

# Cancels the stale (rejected) review submission, sets the App Review note, then
# submits the chosen build for review. Manual trigger. Reuses the ASC API key.
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "TestFlight build number to submit"
        required: true
        default: "1782280986"

env:
  BUNDLE_ID: id.pusakatiles.pusakatiles
  BUILD_NUMBER: ${{ github.event.inputs.build_number }}
  REVIEW_NOTE: "Pusaka Tiles is a 4-lane rhythm/music game (tap falling tiles to play Indonesian folk songs and public-domain classical pieces) - a different genre, codebase, mascot, and visual identity from our block-puzzle title. We have given it its own character, layout, fonts, and content."
  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
  ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  ASC_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

jobs:
  resubmit:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Cancel stale submission + set review note + submit (fastlane)
        run: fastlane force_submit
